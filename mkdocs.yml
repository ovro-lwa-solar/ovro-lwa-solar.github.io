site_name: OVRO-LWA Solar Observation Knowledge-base
site_url: https://ovro-lwa-solar.github.io/
repo_url: https://github.com/ovro-lwa-solar/ovro-lwa-solar.github.io
repo_name: ovro-lwa-solar/ovro-lwa-solar.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - About OVRO-LWA: about-ovro-lwa.md
  - Dynamic Spectrum Data: dynamic-spectrum-data.md
  - Imaging Data: imaging-data.md
  - Data Access: data-access.md

extra:
  analytics:
    provider: google
    property: G-J6J5GSLKJ7

extra_css:
  - stylesheets/extra.css
